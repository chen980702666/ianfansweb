<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "你的真實API_KEY",
    authDomain: "你的專案ID.firebaseapp.com",
    projectId: "你的專案ID",
    storageBucket: "你的專案ID.appspot.com",
    messagingSenderId: "你的SenderID",
    appId: "你的AppID"
  };
  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const provider = new firebase.auth.GoogleAuthProvider();

  document.getElementById("loginBtn").onclick = () => {
    auth.signInWithPopup(provider).then(result => {
      const user = result.user;
      document.getElementById("status").textContent = "登入成功：" + user.displayName;
    }).catch(err => {
      document.getElementById("status").textContent = "登入失敗：" + err.message;
      console.error(err);
    });
  };
</script>
