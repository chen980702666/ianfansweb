<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Google 登入測試</title>
</head>
<body>
  <h2>Google 登入測試</h2>
  <button id="loginBtn">Google 登入</button>
  <div id="status"></div>

  <!-- Firebase v8 SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "你的API_KEY",
      authDomain: "你的專案ID.firebaseapp.com",
      projectId: "你的專案ID"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // 確保按鈕已經存在再綁定
    window.onload = function() {
      document.getElementById("loginBtn").onclick = () => {
        auth.signInWithPopup(provider).then(result => {
          const user = result.user;
          document.getElementById("status").textContent = "登入成功：" + user.displayName;
        }).catch(err => {
          document.getElementById("status").textContent = "登入失敗：" + err.message;
          console.error(err);
        });
      };
    };
  </script>
</body>
</html>
